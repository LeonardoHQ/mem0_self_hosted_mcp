default_language_version:
  python: python3.13
repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff linter
        entry: ruff check
        language: system
        types: [ python ]
        args: [ "--fix" ]

      - id: ruff-format
        name: Ruff formatter
        entry: ruff format
        language: system
        types: [ python ]

      - id: isort
        name: isort
        entry: isort
        language: system
        types: [ python ]

      - id: ty
        name: ty
        entry: ty check
        language: system
        types: [ python ]
